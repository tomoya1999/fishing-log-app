name: Deploy to AWS

# mainブランチにコードがPushされたら自動で動く設定
on:
  push:
    branches:
      - main

# OIDC連携のための権限設定（超重要！）
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Sync S3 bucket
        run: |
          aws s3 sync . s3://fishing-log-app-20260418 --exclude ".git/*" --exclude ".github/*" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id E39UAQ2DT8NFQW --paths "/*"