<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>釣果ログ ver3.0</title>
    <style>
        /* シンプルで見やすいデザイン（スマホ対応） */
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; background-color: #f8f9fa; }
        .container { background-color: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; color: #333; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { width: 100%; padding: 15px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        #message { margin-top: 20px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎣 釣果ログ ver3.0</h1>
        <p style="text-align: center; font-size: 14px; color: #666;">場所を選ぶと、裏側で天気と潮回りが自動記録されます。</p>

        <form id="fishingForm">
            <div class="form-group">
                <label for="fishType">🐟 釣れた魚種:</label>
                <input type="text" id="fishType" name="fishType" placeholder="例: ヒラメ、シーバス" required>
            </div>

            <div class="form-group">
                <label for="size">📏 サイズ (cm):</label>
                <input type="number" id="size" name="size" placeholder="例: 45" required>
            </div>

            <div class="form-group">
                <label for="location">📍 釣り場を選択:</label>
                <select id="location" name="location" required>
                    <option value="34.99,139.86">館山港（千葉県）</option>
                    <option value="35.14,140.32">勝浦港（千葉県）</option>
                    <option value="35.28,139.21">国府津海岸（神奈川県）</option>
                </select>
            </div>

            <button type="submit">ログを記録する</button>
        </form>

        <div id="message"></div>
    </div>

    <script>
        // ⚠️【超重要】ここをご自身のAPI GatewayのURL（エンドポイント）に書き換えてください！
        const API_ENDPOINT = 'https://x3dcy3ddl8.execute-api.ap-northeast-1.amazonaws.com/prod/log';

        // Cognitoのログイン画面から戻ってきた時の「通行証（トークン）」をURLから抜き取る処理
        let idToken = '';
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        if (params.has('id_token')) {
            idToken = params.get('id_token');
        }

        // 送信ボタンが押された時の処理
        document.getElementById('fishingForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // 画面の再読み込みを防ぐ
            const messageEl = document.getElementById('message');
            messageEl.textContent = '⏳ 送信中...（裏側で天気を取得しています）';
            messageEl.style.color = '#555';

            // 入力された値を取得
            const fishType = document.getElementById('fishType').value;
            const size = document.getElementById('size').value;
            const locationValue = document.getElementById('location').value;

            // 💡 ここがポイント！ プルダウンの value（"34.99,139.86"）をカンマで区切って lat と lon に分ける
            const [lat, lon] = locationValue.split(',');

            // Lambdaへ送るデータの塊（JSON）を作る
            const payload = {
                fishType: fishType,
                size: Number(size),
                lat: parseFloat(lat),
                lon: parseFloat(lon)
            };

            try {
                // API Gatewayへデータを送信（fetch）
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': idToken // 通行証を提示してCognito認証を突破
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    messageEl.textContent = '✅ 記録完了！天気・潮回りも自動保存されました！';
                    messageEl.style.color = '#28a745';
                    document.getElementById('fishingForm').reset(); // 入力欄を空に戻す
                } else {
                    throw new Error('APIからの応答がエラーです');
                }
            } catch (error) {
                console.error('Error:', error);
                messageEl.textContent = '❌ 送信エラー。Cognitoの有効期限切れ、または設定を確認してください。';
                messageEl.style.color = '#dc3545';
            }
        });
    </script>
</body>
</html>
